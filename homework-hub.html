<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homework — SAT Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#f5f7fa;--surface:#fff;--surface2:#f1f5f9;--border:#e2e8f0;--text:#1a2233;--muted:#5b6678;
    --accent:#2563eb;--accent-soft:#eaf1fe;--good:#15803d;--good-soft:#eef8f0;--lock:#94a3b8;--radius:14px}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.55;font-size:16px}
  .wrap{max-width:680px;margin:0 auto;padding:1.4rem 1.15rem 4rem}
  header.bar{display:flex;align-items:center;gap:.6rem;margin-bottom:1.2rem}
  .bar .mark{display:flex;align-items:center;gap:.5rem;font-weight:800;color:var(--accent)}
  .bar .tag{flex:1;color:var(--muted);font-size:.85rem;font-weight:600}
  .back{font-size:.82rem;font-weight:700;color:var(--text);text-decoration:none;border:1px solid var(--border);background:var(--surface);border-radius:9px;padding:.4rem .7rem}
  h1{font-size:1.5rem;font-weight:800;margin-bottom:.2rem}
  .who{color:var(--muted);font-size:.95rem;margin-bottom:1.2rem}
  .day{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.1rem;margin-bottom:.8rem;box-shadow:0 1px 2px rgba(15,23,42,.04)}
  .day.locked{opacity:.6}
  .day .top{display:flex;align-items:center;gap:.7rem;margin-bottom:.35rem}
  .day .num{flex:none;width:1.9rem;height:1.9rem;border-radius:50%;background:var(--accent);color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:.9rem}
  .day.locked .num{background:var(--lock)}
  .day.done .num{background:var(--good)}
  .day .focus{font-weight:700;flex:1}
  .day .state{font-size:.74rem;font-weight:800;padding:.2rem .55rem;border-radius:99px;white-space:nowrap}
  .state.open{background:var(--accent-soft);color:var(--accent)}
  .state.done{background:var(--good-soft);color:var(--good)}
  .state.lock{background:var(--surface2);color:var(--lock)}
  .day .meta{font-size:.85rem;color:var(--muted);margin:.1rem 0 .5rem 2.6rem}
  .day .tip{font-size:.88rem;color:var(--text);background:var(--accent-soft);border-radius:9px;padding:.5rem .7rem;margin:0 0 .6rem 2.6rem}
  .day .go{margin-left:2.6rem}
  .btn{display:inline-block;border:none;background:var(--accent);color:#fff;border-radius:9px;padding:.5rem 1rem;font-weight:700;font-size:.88rem;text-decoration:none;cursor:pointer}
  .btn.sec{background:var(--surface);color:var(--text);border:1px solid var(--border)}
  .empty{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.4rem;color:var(--muted)}
  .note{color:var(--muted);font-size:.88rem;margin-top:1.3rem}
  .day .num.ch{background:#7c3aed;font-size:1rem}
  .cbar{height:8px;border-radius:99px;background:var(--surface2);overflow:hidden;margin:.15rem 0 .55rem 2.6rem}
  .cbar i{display:block;height:100%;background:#7c3aed}
  .cchips{display:flex;flex-wrap:wrap;gap:.35rem;margin:0 0 .65rem 2.6rem}
  .cchip{font-size:.72rem;font-weight:600;padding:.15rem .5rem;border-radius:99px;background:var(--surface2);color:var(--muted)}
  .cchip.w{background:#fdeced;color:#b91c1c}
  .cchip.c{background:#fef3c7;color:#92400e}
  .cchip.m{background:var(--good-soft);color:var(--good)}
</style>
<script src="gate.js?v=20260703"></script>
<script src="sheet-sync.js?v=20260703"></script>
<script src="homework/assignments.js?v=20260714"></script>
<!-- Challenge card. progress.js supplies the ledger, challenge-core the segments.
     No question banks are loaded: segmentOf() reads only q.id, so "Mastered N of M"
     is computable from the frozen ids alone. sets.js tolerates a missing
     CHALLENGE_P8 — the debrief payload is not needed on this page. -->
<script src="progress.js?v=20260703"></script>
<script src="challenge/sets.js?v=20260710"></script>
<script src="challenge/challenge-core.js?v=20260710"></script>
</head>
<body>
<div class="wrap">
  <header class="bar">
    <span class="mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3 8-8"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg> Homework</span>
    <span class="tag">Your weekly plan</span>
    <a class="back" href="index.html">Back</a>
  </header>
  <h1 id="title">Homework</h1>
  <p class="who" id="who"></p>
  <div id="list"></div>
  <p class="note" id="note">A new day opens each day. You can always go back to earlier days you missed. Do each day's set in the order shown, and read the explanation for anything you get wrong.</p>
</div>
<script>
(function(){
  var student = (function(){ try { return sessionStorage.getItem('mastery_user'); } catch(e){ return null; } })();
  var list = document.getElementById('list');

  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // The challenge card. No "Done" badge and no day gate: a challenge is not
  // finished after one pass. Each question needs two clean correct answers, and
  // mastery lapses after 21 days — so the ledger, not this page, owns the state.
  function renderChallengeCard(plan){
    var note = document.getElementById('note');
    if (typeof ChallengeCore === 'undefined' || !window.CHALLENGE_SETS) {
      list.innerHTML = '<div class="empty">Your challenge is not available on this device.</div>'; return;
    }
    var sets = ChallengeCore.setsFor(student, window.CHALLENGE_SETS);
    var set  = sets.filter(function(s){ return s.setId === plan.challenge; })[0];
    if (!set || !set.ids.length) {
      list.innerHTML = '<div class="empty">Your challenge set is not ready yet.</div>'; return;
    }
    // segmentOf() only ever reads q.id, so the tally needs the ids and the ledger.
    var stubs = set.ids.map(function(id){ return { id: id }; });
    var c     = ChallengeCore.counts(stubs, getProgress());
    var gate  = ChallengeCore.gate(c);
    var pct   = c.total ? Math.round(c.mastered / c.total * 100) : 0;

    var tip = gate === 'done'
      ? 'Every question is mastered. Well done — reattempt any time to keep it fresh.'
      : gate === 'confirm'
        ? 'Nothing is left unattempted or wrong. Answer the ' + c.correctOnce +
          ' you have only got right once a second time to master them.'
        : 'Mastered ' + c.mastered + ' of ' + c.total + '. This is not finished until all ' + c.total +
          ' are mastered, and each one needs two clean correct answers.';

    list.innerHTML =
      '<div class="day' + (gate === 'done' ? ' done' : '') + '">' +
        '<div class="top">' +
          '<span class="num ch">&#9876;</span>' +
          '<span class="focus">' + esc(set.title) + '</span>' +
          (gate === 'done' ? '<span class="state done">Mastered</span>'
                           : '<span class="state open">' + pct + '%</span>') +
        '</div>' +
        '<div class="meta">' + c.total + ' questions &middot; built from the questions you actually missed on ' +
          esc(set.source) + '</div>' +
        '<div class="cbar"><i style="width:' + pct + '%"></i></div>' +
        '<div class="cchips">' +
          '<span class="cchip m">mastered ' + c.mastered + '</span>' +
          '<span class="cchip w">to fix ' + c.wrong + '</span>' +
          '<span class="cchip c">correct once ' + c.correctOnce + '</span>' +
          '<span class="cchip">not attempted ' + c.notAttempted + '</span>' +
        '</div>' +
        '<div class="tip">' + tip + '</div>' +
        '<div class="go"><a class="btn" href="index.html?challenge=1">Open the Challenge &rarr;</a></div>' +
      '</div>';

    if (note) note.textContent = 'There are no daily sets this week. Work through the challenge whenever you like, ' +
      'as often as you like. It is done when every question is mastered — not when you have been through it once.';
  }

  if (!student) { document.getElementById('who').textContent=''; list.innerHTML='<div class="empty">Please sign in from the hub first.</div>'; return; }
  document.getElementById('who').textContent = 'For ' + student;
  list.innerHTML = '<div class="empty">Loading your homework…</div>';
  hwLoadPlan(student, function(plan, source){
  document.getElementById('who').textContent = 'For ' + student + (source==='sheet' ? ' · from your sheet' : '');
  if (!plan) { list.innerHTML='<div class="empty">No homework is assigned for '+student+' yet.</div>'; return; }
  document.getElementById('title').textContent = plan.title || 'Homework';

  // A plan with a `challenge` key has no days. Completion is mastery, not a tick,
  // so this card defers to the ledger instead of tracking "done" itself.
  if (plan.challenge) { renderChallengeCard(plan); return; }

  var avail = hwDaysAvailable(plan.start);
  function fmtDate(start, offset){ var d=hwParseDate(start); if(!d) return 'soon'; d.setDate(d.getDate()+offset); return d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'}); }
  function done(n){ try { return localStorage.getItem('wayne_hw_'+student+'_'+plan.start+'_'+n)==='1'; } catch(e){ return false; } }
  // A finished day keeps its questions, answers and explanations, so it can be
  // reopened for review — that is where the misses get worked, not in the run.
  function reviewable(n){ try { return !!localStorage.getItem('wayne_hwrec_'+student+'_'+plan.start+'_'+n); } catch(e){ return false; } }
  var html='';
  plan.days.forEach(function(day){
    var open = day.n <= avail;
    var isDone = done(day.n);
    var cls = 'day' + (isDone?' done':(open?'':' locked'));
    var state = isDone? '<span class="state done">Done</span>' : (open? '<span class="state open">Available</span>' : '<span class="state lock">Opens '+fmtDate(plan.start, day.n-1)+'</span>');
    html += '<div class="'+cls+'">'
      + '<div class="top"><span class="num">'+day.n+'</span><span class="focus">'+day.focus+'</span>'+state+'</div>'
      + '<div class="meta">'+(day.diffs?day.diffs.join(' + ')+' &middot; ':'')+(day.sections?day.sections.reduce(function(s,x){return s+(x.count||0);},0):day.count)+' questions'+(day.minutes? ' &middot; '+day.minutes+' min':'')+'</div>'
      + (open? '<div class="tip">'+day.tip+'</div>' : '')
      + (open? '<div class="go" style="display:flex;gap:.5rem;flex-wrap:wrap">'
          + (reviewable(day.n)? '<a class="btn" href="homework-run.html?student='+encodeURIComponent(student)+'&day='+day.n+'&mode=review">Review your misses</a>' : '')
          + '<a class="btn'+((isDone||reviewable(day.n))?' sec':'')+'" href="homework-run.html?student='+encodeURIComponent(student)+'&day='+day.n+'">'+(isDone?'Do it again':'Start day '+day.n)+'</a>'
          + '</div>' : '')
      + '</div>';
  });
  list.innerHTML = html;
  });
})();
</script>
</body>
</html>
